name: Deploy to InfinityFree
on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Explicitly tell it to sync from the root of your repo
        local-dir: ./
        # Use a dot-slash to ensure it targets the correct remote path
        server-dir: ./htdocs/
        # Be extremely aggressive with excludes
        exclude: |
          **/.git*
          **/.git*/**
          **/.github*
          **/.github*/**
          **/node_modules/**
          README.md
          .gitignore
